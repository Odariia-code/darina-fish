<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Рибацький двіж">
<title>Рибацький двіж</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--surface:#21262d;--surface2:#2d333b;
  --border:#30363d;--border2:#444c56;
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5dfa0;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --green:#2ea043;--red:#f85149;--orange:#e3742f;
  --accent:#c9a84c;
  --r:10px;--r2:6px;--r3:16px
}
/* Custom background image */
body.has-bg-image #app{background-image:var(--app-bg-image);background-size:cover;background-position:center;background-attachment:fixed}
body.has-bg-image .header{background:rgba(22,27,34,.85);backdrop-filter:blur(12px)}
body.has-bg-image .content{background:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',sans-serif;color:var(--text);font-size:14px}

/* ===== LAYOUT ===== */
#app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* ===== AUTH ===== */
#auth-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;
}
.auth-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;font-weight:600;
  color:var(--gold2);
  letter-spacing:2px;
  margin-bottom:4px;
  text-align:center;
}
.auth-sub{font-size:12px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
/* autocomplete */
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--gold);border-top:none;border-radius:0 0 var(--r2) var(--r2);z-index:100;max-height:180px;overflow-y:auto;display:none}
.autocomplete-list.open{display:block}
.autocomplete-item{padding:10px 14px;font-size:13px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border)}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:active,.autocomplete-item:hover{background:rgba(201,168,76,.12);color:var(--gold)}
.auth-box{width:100%;max-width:340px}
.auth-tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px;transition:.2s}
.auth-tab.active{background:var(--gold);color:#0d1117;font-weight:600}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r2);padding:11px 14px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:14px;
  outline:none;transition:.2s;-webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field select option{background:var(--bg2)}
.field textarea{resize:none;height:70px;line-height:1.5}
.btn-gold{
  width:100%;background:var(--gold);color:#0d1117;
  border:none;border-radius:var(--r);padding:13px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:.15s;letter-spacing:.3px;
}
.btn-gold:active{transform:scale(.97);background:var(--gold2)}
.btn-gold:disabled{opacity:.5;pointer-events:none}
.auth-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}
.auth-link-btn{display:block;width:100%;background:transparent;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;text-align:center;padding:4px;text-decoration:underline;text-underline-offset:3px}

/* ===== HEADER ===== */
.header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:12px 16px 0;
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.app-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold2);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:var(--r2);padding:6px 10px;color:var(--text2);font-size:12px;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif}
.icon-btn:active{background:var(--surface);color:var(--text)}

.nav{display:flex;gap:2px;padding-bottom:0}
.nav-btn{
  flex:1;padding:9px 4px 10px;border:none;background:transparent;
  color:var(--text3);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:.2s;border-bottom:2px solid transparent;
  letter-spacing:.3px;
}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ===== CONTENT ===== */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.page{display:none;padding:16px}
.page.active{display:block}

/* ===== CARDS / SECTIONS ===== */
.section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between}
.section-label span{color:var(--gold);font-weight:500;font-size:11px;letter-spacing:0}

/* ===== SESSION CARD ===== */
.session-card{
  background:rgba(22,27,34,.7);border:1px solid rgba(48,54,61,.9);
  border-radius:var(--r3);margin-bottom:10px;overflow:hidden;
  cursor:pointer;transition:.15s;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 3px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);
}
.session-card:active{transform:scale(.98)}
.session-card-bg{
  height:90px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#1a2744 0%,#0d1b2a 100%);
}
.session-card-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(13,17,23,0) 0%,rgba(13,17,23,.7) 100%);
}
.session-card-bg-text{
  position:absolute;bottom:10px;left:14px;z-index:1;
  font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;
  color:rgba(201,168,76,.6);letter-spacing:1px;line-height:1;
}
.session-card-body{padding:12px 14px}
.session-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.session-card-title{font-size:15px;font-weight:600;color:var(--text)}
.session-card-sector{font-size:12px;color:var(--text2);margin-top:1px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.5px}
.badge-active{background:rgba(46,160,67,.15);color:var(--green);border:1px solid rgba(46,160,67,.3)}
.badge-done{background:var(--surface);color:var(--text3);border:1px solid var(--border)}
.badge-warn{background:rgba(227,116,47,.12);color:var(--orange);border:1px solid rgba(227,116,47,.3)}
.session-card-meta{display:flex;gap:12px;flex-wrap:wrap}
.session-meta-item{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.session-meta-item strong{color:var(--text);font-weight:600}

/* ===== TIMER ===== */
.timer-block{
  background:linear-gradient(135deg,rgba(26,39,68,.75) 0%,rgba(13,27,42,.75) 100%);
  border:1px solid rgba(201,168,76,.3);border-radius:var(--r3);
  padding:16px;margin-bottom:14px;position:relative;overflow:hidden;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06);
}
.timer-block::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,.08) 0%,transparent 70%);
}
.timer-lake{font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.timer-sector{font-size:13px;color:var(--text2);margin-bottom:12px}
.timer-digits{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--gold2);letter-spacing:1px;line-height:1}
.timer-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.timer-progress{height:3px;background:var(--surface2);border-radius:2px;margin-top:12px;overflow:hidden}
.timer-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width 1s linear}

/* ===== WEATHER ===== */
.weather-strip{
  display:flex;gap:8px;align-items:center;
  background:rgba(22,27,34,.7);border:1px solid rgba(48,54,61,.8);
  border-radius:var(--r);padding:10px 14px;margin-bottom:14px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 2px 12px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.05);
}
.weather-icon{font-size:22px}
.weather-info{flex:1}
.weather-main{font-size:14px;font-weight:600;color:var(--text)}
.weather-sub{font-size:11px;color:var(--text2)}
.weather-extra{display:flex;gap:12px;margin-left:auto}
.weather-extra-item{text-align:center}
.weather-extra-val{font-size:13px;font-weight:600;color:var(--text)}
.weather-extra-lbl{font-size:9px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}

/* ===== BITES LIST ===== */
.bites-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.summary-card{
  background:rgba(22,27,34,.65);border:1px solid rgba(48,54,61,.9);
  border-radius:var(--r);padding:10px;text-align:center;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 2px 10px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.05);
}
.summary-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold2);line-height:1}
.summary-lbl{font-size:9px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}

.bite-card{
  border-radius:var(--r);margin-bottom:8px;overflow:hidden;
  position:relative;cursor:pointer;min-height:90px;
  border:1px solid rgba(48,54,61,.8);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 3px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);
}
.bite-card-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(15,31,53,.7) 0%,rgba(26,42,26,.6) 50%,rgba(13,17,23,.65) 100%);
}
.bite-card-overlay{position:absolute;inset:0;background:rgba(13,17,23,.45)}
.bite-card-content{position:relative;z-index:1;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.bite-fish-col{display:flex;flex-direction:column;align-items:center;gap:4px;width:58px;min-width:58px;max-width:58px}
.bite-fish-weight{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#e8453c;line-height:1;text-shadow:0 0 12px rgba(232,69,60,.35);white-space:nowrap}
.bite-fish-kg{font-size:9px;color:rgba(232,69,60,.7);letter-spacing:.5px}
.bite-fish-name{font-size:9px;color:var(--text2);text-align:center;line-height:1.2;margin-top:2px}
.bite-divider{width:1px;background:var(--border2);align-self:stretch;flex-shrink:0}
.bite-details{flex:1;min-width:0}
.bite-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.bite-tag{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--gold);font-weight:500}
.bite-tag-neutral{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--text2)}
.bite-time{font-size:11px;color:var(--text3);margin-top:4px}
.bite-notes{font-size:11px;color:var(--text2);margin-top:4px;font-style:italic;opacity:.8}
/* Tiny valid/unwanted indicator top-left */
.bite-valid-icon{position:absolute;top:6px;left:8px;z-index:3;font-size:10px;line-height:1;font-weight:700}
.bite-valid-icon.valid{color:#2ea043}
.bite-valid-icon.invalid{color:#f85149}
/* Distance badge bottom-right */
.bite-dist-badge{
  position:absolute;bottom:8px;right:8px;z-index:2;
  background:rgba(99,176,255,.13);border:1px solid rgba(99,176,255,.3);
  border-radius:6px;padding:3px 8px;
  font-size:11px;font-weight:600;color:#63b0ff;letter-spacing:.3px;
}
.unwanted-badge{display:none}/* hide old badge, replaced by tiny icon */

/* ===== FAB ===== */
.fab{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#0d1117;border:none;
  border-radius:28px;padding:14px 32px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;box-shadow:0 4px 24px rgba(201,168,76,.35);
  display:flex;align-items:center;gap:8px;
  transition:.15s;white-space:nowrap;z-index:50;
  max-width:calc(430px - 32px);
}
.fab:active{transform:translateX(-50%) scale(.96)}
.fab.hidden{display:none}

/* ===== MODALS ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border-radius:20px 20px 0 0;
  width:100%;max-width:430px;
  border-top:1px solid var(--border);
  max-height:92dvh;display:flex;flex-direction:column;
  overflow:hidden;
}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.modal-head{padding:12px 20px 0;flex-shrink:0}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold2);margin-bottom:14px}
.modal-body{overflow-y:auto;overflow-x:hidden;padding:0 20px 20px;-webkit-overflow-scrolling:touch;flex:1;min-height:0}
.modal-footer{padding:12px 20px 28px;flex-shrink:0;border-top:1px solid var(--border);width:100%;background:var(--bg2)}
.modal-footer .btn-gold{width:100%}
.modal-footer .cancel-btn{width:100%}
/* fix settings tags wrapping */
.settings-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;max-width:100%}
.settings-tag{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text);cursor:grab;user-select:none;touch-action:none;transition:.15s;max-width:100%;word-break:break-word}

.seg{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:3px;gap:3px;margin-bottom:14px}
.seg-btn{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--text3);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:5px;transition:.15s;text-align:center}
.seg-btn.active{background:var(--gold);color:#0d1117;font-weight:600}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{padding:7px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;transition:.15s;background:transparent;font-family:'Inter',sans-serif}
.chip:active{transform:scale(.95)}
.chip.active{background:var(--gold);color:#0d1117;border-color:var(--gold);font-weight:600}

.rod-chips{display:flex;gap:8px}
.rod-chip{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--r2);font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:.15s;background:transparent;text-align:center;font-family:'Inter',sans-serif}
.rod-chip.active{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
.rod-chip.rod-inactive{opacity:.3;background:transparent;border-color:var(--border);color:var(--text3)}

.divider{height:1px;background:var(--border);margin:14px 0}

.cancel-btn{width:100%;background:transparent;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;padding:8px;text-align:center}

/* ===== STATS ===== */
.stat-bar-row{margin-bottom:10px}
.stat-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.stat-bar-label span:first-child{color:var(--text2)}
.stat-bar-label span:last-child{color:var(--gold);font-weight:600}
.stat-bar-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.stat-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px}

/* ===== SETTINGS ===== */
.settings-section{margin-bottom:20px}
.settings-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.settings-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.settings-tag{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text);cursor:grab;user-select:none;touch-action:none;transition:.15s}
.settings-tag.dragging{opacity:.4;cursor:grabbing}
.settings-tag.drag-over{border-color:var(--gold);background:rgba(201,168,76,.12)}
.settings-tag-drag{font-size:11px;color:var(--text3);cursor:grab;margin-right:2px}
.settings-tag-del{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:0}
.settings-add{display:flex;gap:8px;align-items:center}
.settings-add input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none}
.settings-add input:focus{border-color:var(--gold)}
.settings-add button{background:var(--gold);border:none;border-radius:var(--r2);padding:8px 14px;color:#0d1117;font-weight:600;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}

/* ===== EMPTY ===== */
.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.5}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--text3);line-height:1.6}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:500;z-index:500;
  opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}

/* ===== BITE SWIPE ACTIONS ===== */
.bite-card-wrap{position:relative;margin-bottom:8px;border-radius:var(--r);overflow:hidden}
.bite-card-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch;z-index:0}
.bite-action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;width:56px;border:none;cursor:pointer;font-size:20px;transition:.15s}
.bite-action-edit{background:rgba(201,168,76,.85)}
.bite-action-del{background:rgba(248,81,73,.85)}
.bite-card-wrap .bite-card{position:relative;z-index:1;margin-bottom:0;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.bite-card-wrap.swiped .bite-card{transform:translateX(-112px)}
/* ===== SESSION SPOTS ===== */
.spot-row{background:rgba(22,27,34,.8);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.spot-row.inactive{opacity:.45}
.spot-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.spot-name{font-size:13px;font-weight:600;color:var(--text);flex:1}

<script>
const SB_URL='https://imgzriiglnqazzdmulmo.supabase.co';
const SB_KEY='sb_publishable_NqB1B4yG_aXf34ilbllFNQ_9YF2yeYv';
const sb=supabase.createClient(SB_URL,SB_KEY);

// State
let user=null,settings=null,sessions=[],activeSess=null,bites=[],timerInt=null;
let selRodCount=2,curBaitType='popup';

const DUR={Денна:12,Доба:24,'Дві доби':48};
const UNWANTED=['⚠ Осетер','⚠ Товстолоб','Осетер','Товстолоб'];
const COLOR_HEX={'Жовтий':'#f0d060','Помаранчевий':'#e07830','Рожевий':'#e060a0','Вимитий жовтий':'#d8c890','Білий':'#f0f0f0','Червоний':'#d03030'};

function toLocalDT(d){
  const dt=d?new Date(d):new Date();
  return new Date(dt.getTime()-dt.getTimezoneOffset()*60000).toISOString().slice(0,16);
}
function fmtTime(d){return new Date(d).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'})}
function fmtDate(d){return new Date(d).toLocaleDateString('uk-UA',{day:'numeric',month:'short'})}
function fmtDateTime(d){return fmtDate(d)+' '+fmtTime(d)}
function fmtDur(h){return h===12?'Денна':h===24?'Доба':'Дві доби'}

function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// Auth
let currentAuthTab='login';
let pendingNick='';

function switchAuthTab(tab){
  currentAuthTab=tab;
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-signup').classList.toggle('active',tab==='signup');
  document.getElementById('nick-field').style.display=tab==='signup'?'':'none';
  document.getElementById('a-btn').textContent=tab==='login'?'Увійти':'Зареєструватись';
  document.getElementById('a-pass').autocomplete=tab==='login'?'current-password':'new-password';
  document.getElementById('a-err').textContent='';
}

async function doAuth(){
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  const nick=document.getElementById('a-nick').value.trim();
  const errEl=document.getElementById('a-err');
  errEl.style.color='var(--red)';
  errEl.textContent='';
  if(!email){errEl.textContent='Введіть email';return}
  if(!pass||pass.length<6){errEl.textContent='Пароль мінімум 6 символів';return}
  if(currentAuthTab==='signup'&&!nick){errEl.textContent='Введіть нікнейм';return}
  const btn=document.getElementById('a-btn');
  btn.disabled=true;
  btn.textContent=currentAuthTab==='login'?'Входимо...':'Реєструємо...';

  if(currentAuthTab==='signup'){
    const {data,error}=await sb.auth.signUp({email,password:pass});
    btn.disabled=false;
    btn.textContent='Зареєструватись';
    if(error){
      if(error.message.includes('already registered')||error.message.includes('User already registered')){
        errEl.textContent='Цей email вже зареєстровано. Перейди до входу.';
      } else {
        errEl.textContent=error.message;
      }
      return;
    }
    // зберігаємо нікнейм
    if(data?.user){
      await sb.from('profiles').upsert({id:data.user.id,nickname:nick});
    }
    // одразу входимо
  } else {
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    btn.disabled=false;
    btn.textContent='Увійти';
    if(error){
      if(error.message.includes('Invalid login')||error.message.includes('invalid_credentials')){
        errEl.textContent='Невірний email або пароль';
      } else if(error.message.includes('Email not confirmed')){
        errEl.textContent='Спочатку підтверди email (або вимкни підтвердження в Supabase)';
      } else {
        errEl.textContent=error.message;
      }
    }
  }
}

async function doLogout(){
  await sb.auth.signOut();
  location.reload();
}

// Init
let appStarted=false;
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    await onLogin(session.user);
    return;
  }
  sb.auth.onAuthStateChange(async(event,s)=>{
    if(event==='SIGNED_IN'&&s){
      await onLogin(s.user);
    }
    if(event==='SIGNED_OUT'){
      appStarted=false;
      user=null;
    }
  });
}

async function onLogin(u){
  if(appStarted)return;
  appStarted=true;
  user=u;
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  // показуємо одразу щоб не було вічної загрузки
  document.getElementById('home-content').innerHTML=`<div class="empty-state"><div class="empty-icon">🎣</div><div class="empty-title">Завантаження...</div></div>`;
  try{
    const {data:profile}=await sb.from('profiles').select('nickname').eq('id',u.id).single();
    if(profile?.nickname){
      document.getElementById('header-nick').textContent=profile.nickname;
    }
  }catch(e){}
  try{await loadSettings();}catch(e){console.log('settings err',e)}
  try{await loadSessions();}catch(e){console.log('sessions err',e)}
  renderHome();
}

// Settings
async function loadSettings(){
  const {data}=await sb.from('user_settings').select('*').eq('user_id',user.id).single();
  const defaultFish=[
    {name:'Короп',unwanted:false},{name:'Дзеркальний',unwanted:false},
    {name:'Амур',unwanted:false},{name:'Осетер',unwanted:true},
    {name:'Товстолоб',unwanted:true},{name:'Інше',unwanted:false}
  ];
  if(data){
    settings=data;
    // migrate: якщо fish_types ще немає — додати дефолт
    if(!settings.fish_types||!Array.isArray(settings.fish_types)||settings.fish_types.length===0){
      settings.fish_types=defaultFish;
      await sb.from('user_settings').update({fish_types:defaultFish}).eq('user_id',user.id);
    }
  } else {
    const def={

let dragSrcKey=null,dragSrcIdx=null;
function addTagDrag(el,key){
  el.addEventListener('dragstart',e=>{
    dragSrcKey=key;dragSrcIdx=parseInt(el.dataset.idx);
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('drag-over');
    const toIdx=parseInt(el.dataset.idx);
    if(dragSrcKey===key&&dragSrcIdx!==toIdx){
      const arr=settings[key];
      const [item]=arr.splice(dragSrcIdx,1);
      arr.splice(toIdx,0,item);
      renderSettingsModal();
    }
  });
}
let dragFishSrc=null;
function addFishDrag(el,i){
  el.addEventListener('dragstart',e=>{
    dragFishSrc=i;el.style.opacity='.4';
    e.dataTransfer.effectAllowed='move';
  });
  el.addEventListener('dragend',()=>el.style.opacity='');
  el.addEventListener('dragover',e=>{e.preventDefault();el.style.borderTop='2px solid var(--gold)'});
  el.addEventListener('dragleave',()=>el.style.borderTop='');
  el.addEventListener('drop',e=>{
    e.preventDefault();el.style.borderTop='';
    if(dragFishSrc!==null&&dragFishSrc!==i){
      const arr=settings.fish_types;
      const [item]=arr.splice(dragFishSrc,1);
      arr.splice(i,0,item);
      renderSettingsModal();
    }
  });
}
function delSetting(key,i){settings[key].splice(i,1);renderSettingsModal()}
function addSetting(key){
  const inp=document.getElementById('st-'+key.slice(0,-1)+'-input')||document.getElementById('st-'+key+'-input');
  const v=(inp?.value||'').trim();
  if(!v)return;
  if(!settings[key].includes(v))settings[key].push(v);
  inp.value='';
  renderSettingsModal();
}
function delFish(i){settings.fish_types.splice(i,1);renderSettingsModal()}
function toggleFishUnwanted(i){settings.fish_types[i].unwanted=!settings.fish_types[i].unwanted;renderSettingsModal()}
function addFish(){
  const inp=document.getElementById('st-fish-input');
  const v=(inp?.value||'').trim();
  if(!v)return;
  if(!settings.fish_types)settings.fish_types=[];
  if(!settings.fish_types.find(f=>f.name===v))settings.fish_types.push({name:v,unwanted:false});
  inp.value='';
  renderSettingsModal();
}

function biteCardHTML(b, sessStartedAt){
  const fishObj=(settings?.fish_types||[]).find(f=>f.name===b.fish_type);

  const baitStr=[b.bait_type,b.bait_flavor,b.bait_color,b.bait_size].filter(Boolean).join(' · ');
  const validIcon=uw
    ? `<span class="bite-valid-icon invalid">✕</span>`
    : '';
  const distBadge=b.distance_m
    ? `<div class="bite-dist-badge">${b.distance_m} м.</div>`
    : '';
  // elapsed time from session start
  let elapsedStr='';
  const startTs=sessStartedAt?new Date(sessStartedAt):null;
  if(startTs&&b.bitten_at){
    const diff=new Date(b.bitten_at)-startTs;
    if(diff>=0){
      const eh=Math.floor(diff/3600000);
      const em=Math.floor((diff%3600000)/60000);
      elapsedStr=` <span style="color:var(--text3);font-size:10px">(${eh} год. ${String(em).padStart(2,'0')} хв від поч.)</span>`;
    }
  }
  return `<div class="bite-card-wrap" id="bcw-${b.id}">
    <div class="bite-card-actions">
      <button class="bite-action-btn bite-action-edit" onclick="editBite('${b.id}')" title="Редагувати">✏️</button>
      <button class="bite-action-btn bite-action-del" onclick="deleteBite('${b.id}')" title="Видалити">🗑</button>
    </div>
    <div class="bite-card" ontouchstart="swipeStart(event,'${b.id}')" ontouchend="swipeEnd(event,'${b.id}')">
    <div class="bite-card-bg"></div>
    <div class="bite-card-overlay"></div>
    ${validIcon}
    <button onclick="copyBite(${JSON.stringify(b).replace(/"/g,'&quot;')})" style="position:absolute;top:7px;right:8px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);border-radius:6px;padding:3px 8px;color:var(--gold);font-size:13px;cursor:pointer;z-index:2;line-height:1">⧉</button>
    <div class="bite-card-content">
      <div class="bite-fish-col">
        <div class="bite-fish-weight">${b.weight||'—'}</div>
        <div class="bite-fish-kg">кг</div>
        <div class="bite-fish-name">${b.fish_type}</div>
      </div>
      <div class="bite-divider"></div>
      <div class="bite-details">
        <div class="bite-row">
          ${b.rod_number?`<span class="bite-tag" onclick="showPegTooltip(event,${b.rod_number})" style="cursor:pointer">Вуд. ${b.rod_number}</span>`:''}
        </div>
        ${baitStr?`<div class="bite-row"><span class="bite-tag-neutral" style="font-size:11px">${baitStr}</span></div>`:''}
        <div class="bite-time">${fmtDateTime(b.bitten_at)}${elapsedStr}</div>
        ${b.notes?`<div class="bite-notes">${b.notes}</div>`:''}
      </div>
    </div>
    ${distBadge}
  </div>
  </div>`;
}

// TIMER
function startTimer(){
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(updateTimer,1000);
  updateTimer();
}
function updateTimer(){
  if(!activeSess)return;
  const el=document.getElementById('timer-digits');
  const fill=document.getElementById('timer-fill');
  if(!el)return;
  const now=new Date();
  const ends=new Date(activeSess.ends_at);
  const starts=new Date(activeSess.started_at);
  const total=ends-starts;
  const left=ends-now;
  if(left<=0){el.textContent='0 год. 00 хв.';if(fill)fill.style.width='100%';return}
  const pct=Math.round((1-left/total)*100);
  if(fill)fill.style.width=pct+'%';
  const h=Math.floor(left/3600000);
  const m=Math.floor((left%3600000)/60000);
  el.textContent=`${h} год. ${String(m).padStart(2,'0')} хв.`;
}

// WEATHER
async function fetchWeather(){
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000}));
    const {latitude:lat,longitude:lon}=pos.coords;
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`);
    const d=await r.json();
    const c=d.current;
    const wc=c.weather_code;
    let main='Clear',desc='Ясно';
    if(wc>=80){main='Rain';desc='Злива'}
    else if(wc>=70){main='Snow';desc='Сніг'}
    else if(wc>=60){main='Rain';desc='Дощ'}
    else if(wc>=50){main='Drizzle';desc='Мряка'}
    else if(wc>=30){main='Thunderstorm';desc='Гроза'}
    else if(wc>=10){main='Clouds';desc='Хмарно'}
    return{temp:c.temperature_2m,feels:c.apparent_temperature,humidity:c.relative_humidity_2m,wind:Math.round(c.wind_speed_10m/3.6),main,desc};
  }catch{return null}
}

// NEW BITE MODAL
function openNewBite(){
  if(!activeSess){toast('Немає активної сесії');return}
  editBiteId=null; // always reset edit mode
  document.getElementById('nb-weight').value='';
  document.getElementById('nb-dist').value='';
  document.getElementById('nb-notes').value='';
  document.getElementById('nb-time').value=toLocalDT();
  // reset title/button
  const mt=document.querySelector('#new-bite-modal .modal-title');
  if(mt)mt.textContent='Нова покльовка';
  const nb=document.getElementById('nb-btn');
  if(nb)nb.textContent='Зберегти покльовку';
  // build fish chips from settings
  buildFishChips();
  // rods
  buildRodChips();

  curBaitType='popup';
  document.querySelectorAll('#nb-bait-type .seg-btn').forEach((b,i)=>b.classList.toggle('active',i===0));

  document.getElementById('nb-size-boil-block').style.display='none';

function buildFishChips(){
  const c=document.getElementById('nb-fish');
  c.innerHTML='';
  const fishList=settings?.fish_types||[
    {name:'Короп',unwanted:false},{name:'Дзеркальний',unwanted:false},
    {name:'Амур',unwanted:false},{name:'Осетер',unwanted:true},
    {name:'Товстолоб',unwanted:true},{name:'Інше',unwanted:false}
  ];
  fishList.forEach((f,i)=>{
    const b=document.createElement('button');
    b.className='chip'+(i===0?' active':'');
    b.textContent=f.unwanted?`⚠ ${f.name}`:f.name;
    b.dataset.fishName=f.name;
    b.dataset.unwanted=f.unwanted?'1':'0';
    b.onclick=()=>selChip('nb-fish',b);
    c.appendChild(b);
  });
}

function buildRodChips(){
  const c=document.getElementById('nb-rod-chips');
  c.innerHTML='';
  for(let i=1;i<=activeSess.rods;i++){
    const b=document.createElement('button');
    b.className='rod-chip'+(i===1?' active':'');
    b.textContent=i;
    b.dataset.rodNum=i;
    b.onclick=()=>{
      if(b.dataset.inactive==='1')return; // block inactive rods
      document.querySelectorAll('#nb-rod-chips .rod-chip').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    c.appendChild(b);
  }
}

function buildFlavorChips(){
  const c=document.getElementById('nb-flavor');
  c.innerHTML='';
  (settings?.flavors||[]).forEach((f,i)=>{
    const b=document.createElement('button');
    b.className='chip'+(i===0?' active':'');
    b.textContent=f;
    b.onclick=()=>selChip('nb-flavor',b);
    c.appendChild(b);
  });
}

function buildColorChips(){
  const c=document.getElementById('nb-color');
  c.innerHTML='';
  (settings?.colors||[]).forEach((col,i)=>{
    const hex=COLOR_HEX[col]||'#888';
    const b=document.createElement('button');
    b.className='color-chip'+(i===0?' active':'');
    b.innerHTML=`<span class="color-dot" style="background:${hex}"></span>${col}`;
    b.onclick=()=>{document.querySelectorAll('#nb-color .color-chip').forEach(x=>x.classList.remove('active'));b.classList.add('active')};
    c.appendChild(b);
  });
}

function selBaitType(btn,type){
  curBaitType=type;
  selSeg('nb-bait-type',btn);
  document.getElementById('nb-color-block').style.display=type==='boil'?'none':'';
  document.getElementById('nb-size-block').style.display=(type==='popup'||type==='balance')?'':'none';
  document.getElementById('nb-size-boil-block').style.display=type==='boil'?'':'none';
}

async function saveBite(){
  const fishEl=document.querySelector('#nb-fish .chip.active');
  const fish=fishEl?.dataset.fishName||fishEl?.textContent||'Короп';
  const isUnwanted=fishEl?.dataset.unwanted==='1'||UNWANTED.includes(fish);
  const weight=parseFloat((document.getElementById('nb-weight').value||'').replace(',','.'))||null;
  if(!weight){
    const wInp=document.getElementById('nb-weight');
    wInp.style.border='1px solid var(--red)';
    wInp.style.borderRadius='var(--r2)';
    wInp.setAttribute('placeholder','Обов\'язково!');
    wInp.focus();
    setTimeout(()=>{wInp.style.border='';wInp.removeAttribute('placeholder');},2500);
    toast('⚠ Вкажіть вагу риби');
    return;
  }
  const dist=parseFloat(document.getElementById('nb-dist').value)||null;
  const rodEl=document.querySelector('#nb-rod-chips .rod-chip.active');
  const rod=rodEl?parseInt(rodEl.textContent):null;
  const flavorEl=document.querySelector('#nb-flavor .chip.active');
  const flavor=flavorEl?.textContent||null;
  const colorEl=document.querySelector('#nb-color .color-chip.active');
  const colorText=colorEl?.textContent?.trim()||null;
  const sizeEl=curBaitType==='boil'
    ? document.querySelector('#nb-size-boil .seg-btn.active')
    : document.querySelector('#nb-size .seg-btn.active');
  const size=sizeEl?.textContent||null;
  const timeVal=document.getElementById('nb-time').value;
  const notes=document.getElementById('nb-notes').value.trim();
  const baitTypeLabel={'popup':'Поп-ап','balance':'Баланс','boil':'Бойл'}[curBaitType];
  const btn=document.getElementById('nb-btn');
  btn.disabled=true;btn.textContent='Збереження...';
  const bitePayload={
    fish_type:fish,weight,distance_m:dist,rod_number:rod,
    bait_type:baitTypeLabel,bait_flavor:flavor,bait_color:colorText,bait_size:size,
    notes,is_unwanted:isUnwanted,
    bitten_at:timeVal?new Date(timeVal).toISOString():new Date().toISOString()
  };
  let error;
  if(editBiteId){
    ({error}=await sb.from('bites').update(bitePayload).eq('id',editBiteId));
    editBiteId=null;
  } else {
    ({error}=await sb.from('bites').insert({user_id:user.id,session_id:activeSess.id,...bitePayload}));
  }
  btn.disabled=false;btn.textContent='Зберегти покльовку';
  if(error){toast('Помилка: '+error.message);return}
  closeModal('new-bite-modal');
  // reset modal title
  const mt=document.querySelector('#new-bite-modal .modal-title');
  if(mt)mt.textContent='Нова покльовка';
  toast(isUnwanted?'⚠ Небажана риба зафіксована':'✓ Покльовку збережено!');
  await loadBites(activeSess.id);
  const contentEl=document.querySelector('.content');
  contentEl.scrollTop=contentEl.scrollHeight;
  renderSession();
}

// sessPegDist: number (meters between pegs)

let sessPegDist=5;

  try{

    if(raw){const p=JSON.parse(raw);sessSpots=p.spots||[];sessPegDist=p.pegDist||5;}
    else{sessSpots=[];sessPegDist=5;}

function saveSessSpots(){
  if(!activeSess)return;
  localStorage.setItem('sess_spots_'+activeSess.id,JSON.stringify({spots:sessSpots,pegDist:sessPegDist}));
}

function openSessSpots(){

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px" id="peg-dist-chips">
        ${[4,5].map(v=>`<button onclick="setPegDist(${v})" class="chip${sessPegDist===v?' active':''}" style="padding:10px 24px;font-size:15px">${v}м</button>`).join('')}
      </div>
    </div>
    <div class="divider"></div>
    <div style="margin-bottom:8px">
      <div class="settings-title" style="margin-bottom:8px">Нерозподілені вудилища <span style="font-size:10px;color:var(--text3);font-weight:400">(утримуй і тягни до точки)</span></div>
      <div class="unassigned-pool" id="unassigned-pool"
        ondragover="event.preventDefault();this.classList.add('drag-over-spot')"
        ondragleave="this.classList.remove('drag-over-spot')"
        ondrop="dropRodToUnassigned(event)"
        ontouchover="return false">
        ${unassigned.map(r=>`<div class="spot-rod-chip" draggable="true"
          ondragstart="dragRodStart(event,${r},'unassigned')"
          ontouchstart="touchRodStart(event,${r},'unassigned')"
          ontouchmove="touchRodMove(event)"
          ontouchend="touchRodEnd(event)"
          style="padding:12px 20px;font-size:15px;min-width:72px;justify-content:center">Вуд.${r}</div>`).join('')}
        ${unassigned.length===0?`<span style="font-size:13px;color:var(--text3)">Всі вудилища розподілені</span>`:''}
      </div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

      <button onclick="addSpot()" style="background:var(--gold);border:none;border-radius:var(--r2);padding:8px 16px;color:#0d1117;font-weight:600;font-size:13px;cursor:pointer;font-family:Inter,sans-serif">+ Додати</button>
    </div>

      <div class="spot-header">
        <input value="${spot.name}" onchange="renameSpot(${si},this.value)" style="flex:1;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-size:13px;font-weight:600;font-family:Inter,sans-serif;outline:none;padding:2px 0">
        <input type="number" value="${spot.dist||''}" placeholder="м" onchange="setSpotDist(${si},this.value)" style="width:52px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:#63b0ff;font-size:12px;font-family:Inter,sans-serif;outline:none;padding:3px 6px;text-align:center">

let dragRodNum=null,dragRodFrom=null;
let touchDragEl=null,touchDragClone=null;

function dragRodStart(e,rodNum,fromSi){
  dragRodNum=rodNum;dragRodFrom=fromSi;
  e.dataTransfer.effectAllowed='move';
}

function touchRodStart(e,rodNum,fromSi){
  dragRodNum=rodNum;dragRodFrom=fromSi;
  touchDragEl=e.currentTarget;
  const rect=touchDragEl.getBoundingClientRect();
  touchDragClone=touchDragEl.cloneNode(true);
  touchDragClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.8;z-index:9999;pointer-events:none;transition:none`;
  document.body.appendChild(touchDragClone);
  touchDragEl.style.opacity='.3';
}
function touchRodMove(e){
  if(!touchDragClone)return;
  e.preventDefault();
  const t=e.touches[0];
  touchDragClone.style.left=(t.clientX-40)+'px';
  touchDragClone.style.top=(t.clientY-20)+'px';
  // highlight drop targets
  document.querySelectorAll('.spot-rods,.unassigned-pool').forEach(el=>{
    const r=el.getBoundingClientRect();
    const over=t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom;
    el.classList.toggle('drag-over-spot',over);
  });
}
function touchRodEnd(e){
  if(!touchDragClone)return;
  if(touchDragEl)touchDragEl.style.opacity='';
  touchDragClone.remove();touchDragClone=null;
  const t=e.changedTouches[0];
  // find drop target
  let dropped=false;
  document.querySelectorAll('.spot-rods').forEach(el=>{
    el.classList.remove('drag-over-spot');
    const r=el.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      const toSi=parseInt(el.dataset.si);
      _doDropToSpot(toSi);
      dropped=true;
    }
  });
  const pool=document.getElementById('unassigned-pool');
  if(pool){
    pool.classList.remove('drag-over-spot');
    const r=pool.getBoundingClientRect();
    if(!dropped&&t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      _doDropToUnassigned();dropped=true;
    }
  }
  dragRodNum=null;dragRodFrom=null;touchDragEl=null;
}
function touchRodEndToSpot(e,toSi){
  // handled by touchRodEnd via coordinates
}
function _doDropToSpot(toSi){
  if(dragRodNum===null)return;
  const rodNum=Number(dragRodNum);
  if(dragRodFrom!=='unassigned'){
    const src=sessSpots[dragRodFrom];
    if(src)src.rods=(src.rods||[]).filter(r=>Number(r)!==rodNum);
  }
  if(!sessSpots[toSi].rods)sessSpots[toSi].rods=[];
  if(!sessSpots[toSi].rods.map(Number).includes(rodNum))sessSpots[toSi].rods.push(rodNum);
  saveSessSpots();renderSessSpots();
}
function _doDropToUnassigned(){
  if(dragRodNum===null||dragRodFrom==='unassigned')return;
  const rodNum=Number(dragRodNum);
  const src=sessSpots[dragRodFrom];
  if(src)src.rods=(src.rods||[]).filter(r=>Number(r)!==rodNum);
  saveSessSpots();renderSessSpots();
}
function dropRodToSpot(e,toSi){
  e.preventDefault();
  document.querySelectorAll('.spot-rods,.unassigned-pool').forEach(el=>el.classList.remove('drag-over-spot'));
  _doDropToSpot(toSi);
}
function dropRodToUnassigned(e){
  e.preventDefault();
  document.querySelectorAll('.spot-rods,.unassigned-pool').forEach(el=>el.classList.remove('drag-over-spot'));
  _doDropToUnassigned();
}
function setSpotDist(si,v){
  const val=parseFloat(v)||null;
  sessSpots[si].dist=val;
  saveSessSpots();
  renderSessSpots();
}

function addSpot(){
  const n=sessSpots.length+1;
  sessSpots.push({id:Date.now(),name:`Точка ${n}`,dist:null,active:true,rods:[]});
  saveSessSpots();
  renderSessSpots();
  // focus the distance input of the new spot after render
  setTimeout(()=>{
    const inputs=document.querySelectorAll('.spot-row input[type=number]');
    const last=inputs[inputs.length-1];
    if(last){last.focus();last.style.borderColor='var(--gold)';}
  },80);
}
function delSpot(si){sessSpots.splice(si,1);saveSessSpots();renderSessSpots();}
function toggleSpot(si){sessSpots[si].active=sessSpots[si].active===false?true:false;saveSessSpots();renderSessSpots();}
function renameSpot(si,v){sessSpots[si].name=v;saveSessSpots();}
function setSpotDist(si,v){sessSpots[si].dist=parseFloat(v)||null;saveSessSpots();renderSessSpots();}
function setPegDist(v){sessPegDist=v;saveSessSpots();renderSessSpots();}
function closeSessSpots(){
  // check all spots have distance
  const missing=sessSpots.find(s=>s.active!==false&&!s.dist);
  if(missing){
    toast(`⚠ Вкажіть метри для "${missing.name}"`);
    return;
  }
  saveSessSpots();
  document.getElementById('sess-spots-modal').classList.remove('open');
  buildSpotsChips();
}

function updateRodChipsForSpot(){
  const activeChip=document.querySelector('#nb-spots-chips .chip.active');
  if(!activeChip)return;
  const spotName=activeChip.textContent.replace(/\s*\(.*\)/,'').trim();
  const spot=sessSpots.find(s=>s.name===spotName&&s.active!==false);
  // coerce to Number to avoid string vs number mismatch from localStorage
  const spotRods=(spot?.rods||[]).map(Number);
  const msgEl=document.getElementById('nb-spot-rod-msg');
  let firstActiveBtn=null;

  document.querySelectorAll('#nb-rod-chips .rod-chip').forEach(btn=>{
    const rn=Number(btn.dataset.rodNum||btn.textContent.trim());
    // reset state
    btn.classList.remove('active','rod-inactive');
    btn.dataset.inactive='0';

    if(spotRods.length===0){
      btn.classList.add('rod-inactive');
      btn.dataset.inactive='1';
      if(msgEl)msgEl.style.display='';
    } else if(spotRods.includes(rn)){
      if(!firstActiveBtn)firstActiveBtn=btn;
      if(msgEl)msgEl.style.display='none';
    } else {
      btn.classList.add('rod-inactive');
      btn.dataset.inactive='1';
      if(msgEl)msgEl.style.display='none';
    }
  });
  if(firstActiveBtn)firstActiveBtn.classList.add('active');
}

function buildSpotsChips(){
  const block=document.getElementById('nb-spots-block');
  const chips=document.getElementById('nb-spots-chips');
  if(!block||!chips)return;
  const activeSpots=sessSpots.filter(s=>s.active!==false&&s.dist);
  if(activeSpots.length){
    block.style.display='';
    chips.innerHTML='';
    activeSpots.forEach((spot,i)=>{
      const b=document.createElement('button');
      b.className='chip'+(i===0?' active':'');
      b.textContent=`${spot.name} (${spot.dist}м)`;
      b.dataset.dist=spot.dist;
      b.onclick=()=>{
        document.querySelectorAll('#nb-spots-chips .chip').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('nb-dist').value=spot.dist;
        updateRodChipsForSpot();
      };
      chips.appendChild(b);
    });
    if(activeSpots[0]){document.getElementById('nb-dist').value=activeSpots[0].dist;}
    // trigger rod filter for first spot
    setTimeout(updateRodChipsForSpot,50);
  } else {
    block.style.display='none';
    // reset all rods to enabled
    document.querySelectorAll('#nb-rod-chips .rod-chip').forEach(btn=>{btn.classList.remove('rod-inactive');});
  }
}

// Rod chip tooltip for pegs — called from bite card "Вуд. X" tag
function showPegTooltip(e,rodNum){
  if(activeSess)loadSessSpots();
  const spot=sessSpots.find(s=>(s.rods||[]).includes(rodNum)&&s.active!==false);
  if(!spot||!spot.dist||!sessPegDist)return;
  const pegs=Math.round(spot.dist/sessPegDist);
  // remove any existing tip
  document.querySelectorAll('.peg-tooltip').forEach(t=>t.remove());
  const tip=document.createElement('div');
  tip.className='peg-tooltip';
  tip.textContent=`${pegs} кіл`;
  const rect=e.target.getBoundingClientRect();
  tip.style.cssText=`position:fixed;left:${rect.right-4}px;top:${rect.top}px;transform:translate(0,-100%)`;
  document.body.appendChild(tip);
  setTimeout(()=>tip.remove(),4000);
}

async function deleteBite(id){
  if(!confirm('Видалити цю покльовку?'))return;
  // instantly remove from DOM
  const wrap=document.getElementById('bcw-'+id);
  if(wrap){wrap.style.transition='opacity .2s';wrap.style.opacity='0';setTimeout(()=>wrap.remove(),200);}
  // remove from local bites array immediately
  bites=bites.filter(b=>b.id!==id);
  // update summary counters
  const totalW=bites.reduce((s,b)=>s+(b.weight||0),0);
  const maxB=bites.reduce((a,b)=>(!a||b.weight>a.weight)?b:a,null);
  const cntEl=document.querySelector('.summary-card:nth-child(1) .summary-num');
  const wEl=document.querySelector('.summary-card:nth-child(2) .summary-num');
  const mEl=document.querySelector('.summary-card:nth-child(3) .summary-num');
  if(cntEl)cntEl.textContent=bites.length;
  if(wEl)wEl.textContent=totalW.toFixed(1);
  if(mEl)mEl.textContent=maxB?maxB.weight.toFixed(1):'—';
  const lblEl=document.querySelector('.section-label span');
  if(lblEl)lblEl.textContent=bites.length;
  // delete from DB in background
  await sb.from('bites').delete().eq('id',id);
  toast('✓ Покльовку видалено');
}

// ===== SWIPE DOWN TO CLOSE MODALS =====
function initSwipeDown(handleId,innerId,modalId){
  const handle=document.getElementById(handleId);
  const inner=document.getElementById(innerId);
  if(!handle||!inner)return;
  let startY=0,isDragging=false;
  handle.addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;isDragging=true;
    inner.style.transition='none';
  },{passive:true});
  handle.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    const dy=Math.max(0,e.touches[0].clientY-startY);
    inner.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  handle.addEventListener('touchend',e=>{
    if(!isDragging)return;
    isDragging=false;
    const dy=e.changedTouches[0].clientY-startY;
    inner.style.transition='transform .3s cubic-bezier(.4,0,.2,1)';
    if(dy>80){
      inner.style.transform=`translateY(100%)`;
      setTimeout(()=>{
        closeModal(modalId);
        inner.style.transform='';inner.style.transition='';
      },300);
    } else {
      inner.style.transform='';
      setTimeout(()=>inner.style.transition='',300);
    }
  },{passive:true});
}
setTimeout(()=>{
  initSwipeDown('nb-handle','new-bite-modal-inner','new-bite-modal');
  initSwipeDown('settings-handle','settings-modal-inner','settings-modal');
  initSwipeDown('sess-spots-handle','sess-spots-modal-inner','sess-spots-modal');
},500);

      document.querySelectorAll('#nb-size .seg-btn').forEach(btn=>{
        btn.classList.toggle('active',btn.textContent===b.bait_size);
      });
    }
    // time — set to now
    document.getElementById('nb-time').value=toLocalDT();
    if(b.notes)document.getElementById('nb-notes').value=b.notes;
    // scroll modal to top
    const mb=document.querySelector('#new-bite-modal .modal-body');
    if(mb)mb.scrollTop=0;
  },50);
}

// AUTOCOMPLETE for bait program
const BOUNTY_FLAVORS=['Krill','Halibut','Tiger Nut','Belachan','Squid & Bloodworm','Strawberry & Salmon','Sweet Corn','Mulberry','Scopex','Robin Red','Black Pepper','Squid','Bloodworm','Salmon','Strawberry'];
function onBaitInput(inp){
  const ac=document.getElementById('bait-ac');
  const q=inp.value.trim().toLowerCase();
  if(!q){ac.classList.remove('open');return}
  // search in both BOUNTY_FLAVORS and user settings flavors
  const pool=[...new Set([...BOUNTY_FLAVORS,...(settings?.flavors||[])])];
  const matches=pool.filter(f=>f.toLowerCase().includes(q)).slice(0,6);
  if(!matches.length){ac.classList.remove('open');return}
  ac.innerHTML=matches.map(f=>`<div class="autocomplete-item" onmousedown="pickBaitAC('${f}')">${f}</div>`).join('');
  ac.classList.add('open');
}
function pickBaitAC(val){
  const inp=document.getElementById('ns-bait');
  inp.value=val;
  document.getElementById('bait-ac').classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.autocomplete-wrap'))document.getElementById('bait-ac')?.classList.remove('open');
});
function selRod(n){
  selRodCount=n;
  document.querySelectorAll('#ns-rods .rod-chip').forEach((b,i)=>b.classList.toggle('active',i+1===n));
}
function selSeg(id,btn){
  document.querySelectorAll('#'+id+' .seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function selChip(groupId,btn){
  document.querySelectorAll('#'+groupId+' .chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function openModal(id){
  if(id==='settings-modal'){
    renderSettingsModal();
    // підставити поточний нікнейм
    const cur=document.getElementById('header-nick').textContent.replace('· ','').trim();
    document.getElementById('st-nick-input').value=cur;
    document.getElementById('st-nick-msg').textContent='';
    // show bg preview if set
    const savedBg=localStorage.getItem('app_bg_photo');
    const preview=document.getElementById('bg-preview');
    const previewImg=document.getElementById('bg-preview-img');
    if(savedBg){preview.style.display='';previewImg.src=savedBg}
    else{preview.style.display='none'}
  }
  document.getElementById(id).classList.add('open');
}
function onBgPhotoChange(inp){
  const file=inp.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    // compress image via canvas before storing
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const maxW=1080,maxH=1920;
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.82);
      try{localStorage.setItem('app_bg_photo',dataUrl);}catch(e){console.log('storage full')}
      applyBgPhoto(dataUrl);
      const preview=document.getElementById('bg-preview');
      const previewImg=document.getElementById('bg-preview-img');
      if(preview&&previewImg){preview.style.display='';previewImg.src=dataUrl}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removeBgPhoto(){
  localStorage.removeItem('app_bg_photo');
  document.body.classList.remove('has-bg-image');
  document.documentElement.style.removeProperty('--app-bg-image');
  const app=document.getElementById('app');
  if(app){app.style.backgroundImage='';app.style.backgroundSize='';app.style.backgroundPosition='';}
  document.getElementById('bg-preview').style.display='none';
  document.getElementById('bg-photo-input').value='';
}
function applyBgPhoto(dataUrl){
  document.documentElement.style.setProperty('--app-bg-image',`url("${dataUrl}")`);
  document.body.classList.add('has-bg-image');
  // force repaint
  const app=document.getElementById('app');
  if(app){app.style.backgroundImage=`url("${dataUrl}")`;app.style.backgroundSize='cover';app.style.backgroundPosition='center';}
}
// Apply saved bg on load
(function(){const bg=localStorage.getItem('app_bg_photo');if(bg)applyBgPhoto(bg)})();
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  if(id==='new-bite-modal'){
    editBiteId=null;
    const mt=document.querySelector('#new-bite-modal .modal-title');
    if(mt)mt.textContent='Нова покльовка';
    const nb=document.getElementById('nb-btn');
    if(nb)nb.textContent='Зберегти покльовку';
  }
}
// close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')});
});

init();
